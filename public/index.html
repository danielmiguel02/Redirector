<!DOCTYPE html>
<html>
<head>
    <title>Redirector</title>
</head>
<body>

<h1>Redirector</h1>

<h2>Register</h2>
<input id="registerName" placeholder="Name">
<input id="registerEmail" placeholder="Email">
<input id="registerPassword" type="password" placeholder="Password">
<button onclick="register()">Register</button>

<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h2>Logout</h2>
<button onclick="logout()">Logout</button>

<hr>

<h2>Create URL</h2>
<input id="urlInput" placeholder="https://example.com">
<button onclick="createUrl()">Create URL</button>

<p id="shortUrl"></p>

<hr>

<h2>Analytics</h2>
<input id="codeInput" placeholder="Short code">
<button onclick="getAnalytics()">Get Analytics</button>

<pre id="analyticsResult"></pre>

<script src="script.js"></script>

</body>
</html>
